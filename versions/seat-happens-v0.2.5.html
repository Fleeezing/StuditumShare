<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Seat Happens</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #fff;
      --ink: #17211c;
      --muted: #65716a;
      --line: #d8e0dc;
      --soft: #edf3ef;
      --blue: #2368d8;
      --green: #227a48;
      --red: #bd2c2c;
      --yellow: #9b6700;
      --violet: #6d54c8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }

    button {
      min-height: 34px;
      border: 1px solid #b9c7bd;
      border-radius: 7px;
      padding: 0 12px;
      color: var(--ink);
      background: #edf4f0;
      font-weight: 650;
      cursor: pointer;
    }

    button.primary {
      border-color: #8db6ff;
      background: #e6f0ff;
      color: #163f86;
    }

    button.danger {
      border-color: #efc2c2;
      background: #fff0f0;
      color: var(--red);
    }

    button.small {
      min-height: 28px;
      padding: 0 9px;
      font-size: 12px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 10px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #91b7ff;
      box-shadow: 0 0 0 3px rgba(35, 104, 216, 0.12);
    }

    main {
      width: min(1180px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 30px;
    }

    h1, h2, h3 {
      margin: 0;
      line-height: 1.25;
    }

    h1 { font-size: 23px; }
    h2 { font-size: 16px; }
    h3 { font-size: 14px; }

    .topbar {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 15px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }

    .panel-body {
      padding: 14px 15px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .split {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field span {
      color: var(--muted);
      font-size: 12px;
    }

    .auth-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .auth {
      width: min(760px, 100%);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .hidden { display: none !important; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 9px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      white-space: nowrap;
    }

    .pill.admin {
      color: #fff;
      background: var(--violet);
    }

    .tag-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfb;
      display: grid;
      gap: 5px;
      cursor: pointer;
    }

    .tag.active {
      border-color: #8db6ff;
      background: #f2f7ff;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(112px, 1fr));
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
    }

    .day-card {
      min-height: 96px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fbfcfb;
      cursor: pointer;
      display: grid;
      gap: 7px;
      align-content: start;
    }

    .day-card.active {
      border-color: #8db6ff;
      background: #f2f7ff;
    }

    .day-card strong {
      font-size: 13px;
    }

    .day-count {
      color: var(--muted);
      font-size: 12px;
    }

    .room-card {
      border-left: 4px solid var(--green);
    }

    .room-card.full {
      border-left-color: var(--red);
    }

    .room-card.soon {
      border-left-color: var(--yellow);
    }

    .room-card.cancelled {
      border-left-color: var(--red);
      background: #fff7f7;
    }

    .captain-badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      background: #fff3c4;
      color: #6b4a00;
      font-size: 12px;
      font-weight: 750;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 2px 8px;
      background: #eef4f0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .status-chip.open { background: #edf8ef; color: var(--green); }
    .status-chip.tight { background: #fff7dc; color: var(--yellow); }
    .status-chip.full { background: #fff0f0; color: var(--red); }
    .status-chip.planned { background: #eef4ff; color: #2458b8; }
    .status-chip.active { background: #edf8ef; color: var(--green); }
    .status-chip.cancelled { background: #fff0f0; color: var(--red); }
    .status-chip.completed { background: #eef1f4; color: #52606d; }

    .compact-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: var(--blue);
      flex: 0 0 auto;
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfb;
      display: grid;
      gap: 7px;
    }

    .task {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 9px;
      align-items: start;
    }

    .task input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
    }

    .task.done .task-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .task-title {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
    }

    .metric-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 22px;
      line-height: 1;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 96px 1fr 44px;
      gap: 9px;
      align-items: center;
      font-size: 13px;
    }

    .bar {
      height: 11px;
      border-radius: 999px;
      background: #e7eeea;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: var(--green);
    }

    .chat {
      max-height: 330px;
      overflow: auto;
      padding-right: 3px;
    }

    .message {
      border-left: 3px solid #c8d7cf;
      padding: 7px 9px;
      background: #fbfcfb;
      border-radius: 0 7px 7px 0;
    }

    .notice {
      border: 1px solid #d5dce8;
      border-radius: 8px;
      padding: 10px 12px;
      background: #f5f8ff;
      color: #2a4068;
      font-size: 13px;
      line-height: 1.45;
    }

    .captain-editor-section {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      display: grid;
      gap: 9px;
    }

    .captain-editor-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .captain-editor-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      align-items: end;
    }

    .captain-editor-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-top: 8px;
    }

    .captain-editor-status {
      min-height: 19px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .captain-editor-status.success {
      color: var(--green);
      font-weight: 650;
    }

    .captain-editor-status.error {
      color: var(--red);
      font-weight: 650;
    }

    .error {
      color: var(--red);
      font-size: 13px;
      min-height: 19px;
    }

    .empty {
      border: 1px dashed #c8d3cd;
      border-radius: 8px;
      padding: 14px;
      color: var(--muted);
      background: #fbfcfb;
      font-size: 13px;
      line-height: 1.45;
    }

    .release-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
      display: grid;
      gap: 8px;
    }

    .release-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .release-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .release-date {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .release-list {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      display: grid;
      gap: 4px;
    }

    .mono {
      font-family: "Cascadia Mono", "Consolas", ui-monospace, monospace;
    }

    @media (max-width: 980px) {
      main { width: min(100vw - 18px, 780px); }
      .layout, .auth, .grid-2, .grid-3, .metric-row { grid-template-columns: 1fr; }
      .topbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div id="authView" class="auth-wrap">
    <div class="auth">
      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>登录</h2>
          </div>
        </div>
        <div class="panel-body stack">
          <label class="field">
            <span>用户名</span>
            <input id="loginUsername" autocomplete="username" placeholder="例如 alice">
          </label>
          <label class="field">
            <span>密码</span>
            <input id="loginPassword" type="password" autocomplete="current-password">
          </label>
          <button id="loginButton" class="primary" type="button">登录</button>
          <div id="loginError" class="error"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <h2>注册</h2>
          </div>
        </div>
        <div class="panel-body stack">
          <label class="field">
            <span>用户名</span>
            <input id="signupUsername" autocomplete="username" placeholder="小写字母/数字">
          </label>
          <label class="field">
            <span>昵称</span>
            <input id="signupNickname" placeholder="页面上显示的名字">
          </label>
          <label class="field">
            <span>密码</span>
            <input id="signupPassword" type="password" autocomplete="new-password">
          </label>
          <label class="field">
            <span>管理员邀请码</span>
            <input id="adminSetupCode" autocomplete="off" placeholder="普通用户留空">
          </label>
          <button id="signupButton" class="primary" type="button">创建账号</button>
          <div id="signupError" class="error"></div>
        </div>
      </section>
    </div>
  </div>

  <main id="appView" class="hidden">
    <div class="topbar">
      <div>
        <h1>Seat Happens</h1>
        <div class="muted">先把房间共享和座位加入流程跑顺，再补别的功能。</div>
      </div>
      <div class="row">
        <span id="userBadge" class="pill"></span>
        <button id="refreshButton" type="button">刷新</button>
        <button id="logoutButton" type="button">退出</button>
      </div>
    </div>

    <div class="layout">
      <section class="stack">
        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>房间共享</h2>
              <div class="muted">看未来 7 天谁会去 StudiTUM；Captain 到场后直接填写房间号和可共享座位。</div>
            </div>
          </div>
          <div class="panel-body stack">
            <div id="roomCalendar" class="calendar-grid"></div>
            <div class="grid-3">
              <label class="field">
                <span>日期</span>
                <input id="roomPlanDate" type="date">
              </label>
              <label class="field">
                <span>开始</span>
                <input id="roomStartTime" type="time" value="09:00">
              </label>
              <label class="field">
                <span>结束</span>
                <input id="roomEndTime" type="time" value="18:00">
              </label>
            </div>
            <div class="grid-3">
              <label class="field">
                <span>Captain 到达</span>
                <input id="captainArrival" type="time" value="07:30">
              </label>
              <label class="field">
                <span>房间类型</span>
                <select id="roomType">
                  <option value="small_room">小自习室 · 4 人</option>
                  <option value="medium_room">中自习室 · 6 人</option>
                  <option value="large_classroom">大教室</option>
                </select>
              </label>
              <label class="field">
                <span>预计可共享座位</span>
                <input id="roomCapacity" type="number" min="1" max="40" value="4">
              </label>
            </div>
            <div class="grid-2">
              <label class="field">
                <span>主题</span>
                <input id="roomTopic" placeholder="无主题 / RD / i2dl / 安静自习">
              </label>
              <label class="field">
                <span>讨论模式</span>
                <select id="discussionMode">
                  <option value="quiet">安静自习</option>
                  <option value="flexible">可小声讨论</option>
                  <option value="discussion">讨论型</option>
                </select>
              </label>
            </div>
            <label class="field">
              <span>备注</span>
              <input id="roomNote" placeholder="例如：先抢中房间，抢不到就小房间">
            </label>
            <button id="createRoomPlanButton" class="primary" type="button">作为 Captain 发布计划</button>
            <div id="myCaptainActions" class="list"></div>
            <div id="roomPlans" class="list"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>Seat Captain Board</h2>
            </div>
          </div>
          <div class="panel-body">
            <div id="captainBoard" class="list"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>广场聊天</h2>
            </div>
          </div>
          <div class="panel-body stack">
            <div id="chatList" class="list chat"></div>
            <div class="row">
              <input id="chatInput" placeholder="写一条消息">
              <button id="sendChatButton" type="button">发送</button>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>反馈</h2>
            </div>
          </div>
          <div class="panel-body stack">
            <label class="field">
              <span>分类</span>
              <select id="feedbackCategory">
                <option value="general">general</option>
                <option value="bug">bug</option>
                <option value="suggestion">suggestion</option>
                <option value="privacy">privacy</option>
              </select>
            </label>
            <textarea id="feedbackMessage" placeholder="写下 bug、建议或问题"></textarea>
            <button id="sendFeedbackButton" type="button">提交反馈</button>
            <div id="feedbackStatus" class="muted"></div>
            <div id="adminFeedbackPanel" class="hidden stack">
              <div class="split">
                <h3>管理员反馈箱</h3>
                <button id="reloadFeedbackButton" class="small" type="button">刷新</button>
              </div>
              <div id="feedbackList" class="list"></div>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h2>版本更新</h2>
              <div class="muted">每次发布后，这里会简要记录当前版本和最近改动。</div>
            </div>
            <span id="releaseVersionBadge" class="pill"></span>
          </div>
          <div class="panel-body">
            <div id="releaseHistory" class="list"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

    function $(id) {
      return document.getElementById(id);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function normalizeUsername(value) {
      return value.trim().toLowerCase().replace(/[^a-z0-9_.-]/g, "");
    }

    function fakeEmail(username) {
      return `${normalizeUsername(username)}@study.local`;
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function roomPlanStartsAt(plan) {
      return new Date(`${plan.plan_date}T${timeShort(plan.start_time) || "00:00"}:00`);
    }

    function addDays(dateString, days) {
      const date = new Date(`${dateString}T12:00:00`);
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function dayLabel(dateString) {
      const date = new Date(`${dateString}T12:00:00`);
      return date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
    }

    function timeShort(value) {
      return value ? String(value).slice(0, 5) : "";
    }

    function profileName(id) {
      const profile = state.profiles.find((item) => item.id === id);
      return profile?.nickname || profile?.username || "未知用户";
    }

    function isAdmin() {
      return state.profile?.role === "admin";
    }

    function roomTypeLabel(type) {
      return {
        small_room: "小自习室",
        medium_room: "中自习室",
        large_classroom: "大教室"
      }[type] || type;
    }

    function discussionLabel(mode) {
      return {
        quiet: "安静自习",
        flexible: "可小声讨论",
        discussion: "讨论型"
      }[mode] || mode;
    }

    function roomTypeOptions(selected) {
      return [
        ["small_room", "小自习室 · 4 人"],
        ["medium_room", "中自习室 · 6 人"],
        ["large_classroom", "大教室"]
      ].map(([value, label]) => `<option value="${value}" ${selected === value ? "selected" : ""}>${label}</option>`).join("");
    }

    function discussionModeOptions(selected) {
      return [
        ["quiet", "安静自习"],
        ["flexible", "可小声讨论"],
        ["discussion", "讨论型"]
      ].map(([value, label]) => `<option value="${value}" ${selected === value ? "selected" : ""}>${label}</option>`).join("");
    }

    function defaultCapacity(type) {
      return {
        small_room: 4,
        medium_room: 6,
        large_classroom: 20
      }[type] || 4;
    }

    function guestSeatsHeld(plan) {
      return Math.max(0, Number(plan.guest_hold_count || 0));
    }

    function shareableSeatLimit(plan) {
      return Math.max(0, Number(plan.max_capacity || 0) - 1 - guestSeatsHeld(plan));
    }

    function cancellationMoment(plan) {
      return plan.cancelled_at || plan.updated_at || null;
    }

    function wasCancelledLate(plan) {
      if (plan.status !== "cancelled") return false;
      const cancelledAt = cancellationMoment(plan);
      if (!cancelledAt) return false;
      const diffHours = (roomPlanStartsAt(plan).getTime() - new Date(cancelledAt).getTime()) / 36e5;
      return diffHours <= 12;
    }

    function isVisiblePlan(plan) {
      return plan.status !== "cancelled" || wasCancelledLate(plan);
    }

    function visiblePlansForDate(dateString) {
      return state.roomPlans
        .filter((plan) => plan.plan_date === dateString)
        .filter(isVisiblePlan);
    }

    function planStatusLabel(plan) {
      if (plan.status === "cancelled") return "已取消";
      if (plan.status === "active") return "已到达";
      if (plan.status === "completed") return "已完成";
      return "计划中";
    }

    function checkInOpensAt(plan) {
      const gate = timeShort(plan.planned_arrival) || timeShort(plan.start_time) || "00:00";
      return new Date(`${plan.plan_date}T${gate}:00`);
    }

    function canCheckInNow(plan) {
      return Date.now() >= checkInOpensAt(plan).getTime();
    }

    function membersForPlan(planId) {
      return state.roomMembers.filter((member) => member.room_plan_id === planId);
    }

    function activeMembersForPlan(planId) {
      return membersForPlan(planId).filter((member) => ["requested", "expected", "confirmed"].includes(member.status));
    }

    function confirmedMembersForPlan(planId) {
      return membersForPlan(planId).filter((member) => member.status === "confirmed");
    }

    function activeGuestsForPlan(plan) {
      return activeMembersForPlan(plan.id).filter((member) => member.user_id !== plan.captain_id);
    }

    function seatsLeft(plan) {
      return Math.max(0, plan.max_capacity - activeMembersForPlan(plan.id).length - guestSeatsHeld(plan));
    }

    function hasJoined(planId) {
      return membersForPlan(planId).some((member) => member.user_id === state.profile.id && !["cancelled", "released"].includes(member.status));
    }

    function myMembership(planId) {
      return membersForPlan(planId).find((member) => member.user_id === state.profile.id);
    }

    function captainTitle(userId) {
      const plans = state.roomPlans.filter((plan) => plan.captain_id === userId);
      const completed = plans.filter((plan) => plan.status === "completed");
      const early = completed.filter((plan) => plan.planned_arrival && timeShort(plan.planned_arrival) <= "07:45");
      if (completed.length >= 5) return "Room Ranger";
      if (early.length >= 1) return "7:30 Hero";
      if (completed.length >= 1) return "Promise Keeper";
      if (plans.length >= 1) return "Seat Captain";
      return "";
    }

    function captainReliability(userId) {
      const plans = state.roomPlans.filter((plan) => plan.captain_id === userId);
      const completed = plans.filter((plan) => plan.status === "completed").length;
      const cancelled = plans.filter((plan) => plan.status === "cancelled").length;
      const total = completed + cancelled;
      if (total === 0) return "new";
      return `${Math.round((completed / total) * 100)}%`;
    }

    function hoursUntilPlan(plan) {
      const start = roomPlanStartsAt(plan);
      return (start.getTime() - Date.now()) / 36e5;
    }

    function canEditRoomPlan(plan) {
      return isAdmin() || (plan.captain_id === state.profile.id && hoursUntilPlan(plan) > 12);
    }

    function canManageArrivalInfo(plan) {
      return isAdmin() || plan.captain_id === state.profile.id;
    }

    function focusCaptainEditor(planId, focus = "room") {
      const card = document.querySelector(`[data-captain-card="${planId}"]`);
      if (!card) return;
      card.scrollIntoView({ behavior: "smooth", block: "center" });
      const target = focus === "plan"
        ? document.querySelector(`[data-captain-start="${planId}"]`)
        : document.querySelector(`[data-captain-room="${planId}"]`);
      target?.focus();
      if (focus === "room") {
        setCaptainEditorStatus(planId, "填写房间号后，请点击“保存房间号和座位”。", "");
      }
    }

    function setCaptainEditorStatus(planId, message, type = "") {
      const box = document.querySelector(`[data-captain-status="${planId}"]`);
      if (!box) return;
      box.className = `captain-editor-status ${type}`.trim();
      box.textContent = message;
    }

    async function requireOk(result, fallbackMessage) {
      if (result.error) throw new Error(result.error.message || fallbackMessage);
      return result.data;
    }

    async function signUp() {
      $("signupError").textContent = "";
      const username = normalizeUsername($("signupUsername").value);
      const nickname = $("signupNickname").value.trim() || username;
      const password = $("signupPassword").value;
      const adminSetupCode = $("adminSetupCode").value.trim();
      if (!username || password.length < 6) {
        $("signupError").textContent = "用户名不能为空，密码至少 6 位。";
        return;
      }

      const result = await supabase.auth.signUp({
        email: fakeEmail(username),
        password,
        options: { data: { username, nickname, admin_setup_code: adminSetupCode } }
      });

      if (result.error) {
        $("signupError").textContent = result.error.message;
        return;
      }

      $("signupError").textContent = "账号已创建。如果没有自动进入，请尝试登录。";
      await boot();
    }

    async function login() {
      $("loginError").textContent = "";
      const username = normalizeUsername($("loginUsername").value);
      const password = $("loginPassword").value;
      if (!username || !password) {
        $("loginError").textContent = "请输入用户名和密码。";
        return;
      }

      const result = await supabase.auth.signInWithPassword({
        email: fakeEmail(username),
        password
      });

      if (result.error) {
        $("loginError").textContent = result.error.message;
        return;
      }

      await boot();
    }

    async function logout() {
      await supabase.auth.signOut();
      state.session = null;
      state.profile = null;
      renderAuth();
    }

    async function boot() {
      const result = await supabase.auth.getSession();
      state.session = result.data.session;
      if (!state.session) {
        renderAuth();
        return;
      }
      await loadApp();
      renderApp();
    }

    async function loadApp() {
      const userId = state.session.user.id;

      state.profile = await requireOk(
        await supabase.from("profiles").select("*").eq("id", userId).single(),
        "Cannot load profile"
      );

      state.profiles = await requireOk(
        await supabase.from("profiles").select("*").order("nickname"),
        "Cannot load profiles"
      );

      state.roomPlans = await requireOk(
        await supabase.from("room_plans").select("*").gte("plan_date", addDays(today(), -30)).order("plan_date").order("start_time").limit(500),
        "Cannot load room plans. Please run supabase_room_mvp_migration.sql first."
      );

      const roomPlanIds = state.roomPlans.map((item) => item.id);
      state.roomMembers = roomPlanIds.length
        ? await requireOk(await supabase.from("room_plan_members").select("*").in("room_plan_id", roomPlanIds), "Cannot load room members")
        : [];

      state.chat = await requireOk(
        await supabase.from("chat_messages").select("*").is("deleted_at", null).order("created_at", { ascending: false }).limit(50),
        "Cannot load chat"
      );

      state.feedback = isAdmin()
        ? await requireOk(await supabase.from("feedback").select("*").order("created_at", { ascending: false }).limit(100), "Cannot load feedback")
        : [];
    }

    function renderAuth() {
      $("authView").classList.remove("hidden");
      $("appView").classList.add("hidden");
    }

    function syncSeatCaptainLabels() {
      $("createRoomPlanButton").textContent = "作为 Seat Captain 发布计划";
      const roomPanelSubtitle = document.querySelector("#appView section.stack > .panel .panel-head .muted");
      if (roomPanelSubtitle) roomPanelSubtitle.textContent = "看未来 7 天谁会去 StudiTUM；Seat Captain 到场后直接填写房间号和可共享座位。";
      const arrivalLabel = document.querySelector('input#captainArrival')?.previousElementSibling;
      if (arrivalLabel) arrivalLabel.textContent = "Seat Captain 到达";
      const boardTitle = document.querySelector("#captainBoard")?.closest(".panel")?.querySelector("h2");
      if (boardTitle) boardTitle.textContent = "Seat Captain Board";
    }

    function renderApp() {
      $("authView").classList.add("hidden");
      $("appView").classList.remove("hidden");
      $("roomPlanDate").value ||= today();
      syncSeatCaptainLabels();
      renderUserBadge();
      renderRoomCalendar();
      renderMyCaptainActions();
      renderRoomPlans();
      renderCaptainBoard();
      renderChat();
      renderFeedback();
      renderReleaseHistory();
    }

    function renderUserBadge() {
      const badge = $("userBadge");
      badge.className = `pill ${isAdmin() ? "admin" : ""}`;
      badge.textContent = `${state.profile.nickname} · ${state.profile.role}`;
    }

    function renderRoomCalendar() {
      const selected = $("roomPlanDate").value || today();
      const box = $("roomCalendar");
      box.replaceChildren();

      for (let i = 0; i < 7; i += 1) {
        const date = addDays(today(), i);
        const plans = visiblePlansForDate(date);
        const openPlans = plans.filter((plan) => plan.status !== "cancelled" && seatsLeft(plan) > 0).length;
        const card = document.createElement("button");
        card.type = "button";
        card.className = `day-card ${date === selected ? "active" : ""}`;
        card.innerHTML = `
          <strong>${escapeHtml(dayLabel(date))}</strong>
          <span class="day-count">${plans.length} plans · ${openPlans} open</span>
        `;
        card.addEventListener("click", () => {
          $("roomPlanDate").value = date;
          renderRoomCalendar();
          renderRoomPlans();
        });
        box.appendChild(card);
      }
    }

    function renderRoomPlans() {
      const selected = $("roomPlanDate").value || today();
      const box = $("roomPlans");
      box.replaceChildren();
      const plans = visiblePlansForDate(selected).sort((a, b) => `${a.start_time}`.localeCompare(`${b.start_time}`));

      if (plans.length === 0) {
        box.innerHTML = `<div class="empty">这一天还没有房间计划。</div>`;
        return;
      }

      plans.forEach((plan) => {
        const members = membersForPlan(plan.id);
        const activeGuests = activeGuestsForPlan(plan);
        const confirmed = confirmedMembersForPlan(plan.id);
        const left = seatsLeft(plan);
        const cancelledLate = wasCancelledLate(plan);
        const joined = hasJoined(plan.id);
        const mine = myMembership(plan.id);
        const isCaptain = plan.captain_id === state.profile.id;
        const canManage = isCaptain || isAdmin();
        const canEdit = canEditRoomPlan(plan);
        const canManageArrival = canManageArrivalInfo(plan);
        const checkInReady = canCheckInNow(plan);
        const fullnessClass = plan.status === "cancelled" ? "cancelled" : left <= 0 ? "full" : left <= 1 ? "soon" : "";
        const seatClass = left <= 0 ? "full" : left <= 1 ? "tight" : "open";
        const planStatusClass = plan.status === "cancelled" ? "cancelled" : plan.status === "active" ? "active" : "planned";
        const captainTitleText = captainTitle(plan.captain_id);
        const item = document.createElement("div");
        item.className = `item room-card ${fullnessClass}`;
        item.innerHTML = `
          <div class="split">
            <div>
              <strong>${escapeHtml(timeShort(plan.start_time))}-${escapeHtml(timeShort(plan.end_time))} · ${escapeHtml(roomTypeLabel(plan.room_type))}</strong>
              <div class="muted">Seat Captain: ${escapeHtml(profileName(plan.captain_id))} ${captainTitleText ? `<span class="captain-badge">${escapeHtml(captainTitleText)}</span>` : ""}</div>
            </div>
            <div class="compact-list">
              <span class="status-chip ${plan.status === "completed" ? "completed" : planStatusClass}">${planStatusLabel(plan)}</span>
              <span class="status-chip ${seatClass}">${left} 可加入</span>
            </div>
          </div>
          <div class="compact-list">
            <span class="pill">${escapeHtml(discussionLabel(plan.discussion_mode))}</span>
            <span class="pill">${confirmed.length} checked in</span>
            <span class="pill">${activeGuests.length}/${shareableSeatLimit(plan)} 已加入</span>
          </div>
          <div><strong>${escapeHtml(plan.actual_room_label ? "房间 " + plan.actual_room_label : "房间号待 Seat Captain 到场后补充")}</strong></div>
          <div class="muted">${escapeHtml(plan.topic || "无主题")} · Seat Captain ETA ${escapeHtml(timeShort(plan.planned_arrival) || "未设置")}</div>
          ${cancelledLate ? `<div class="muted" style="color:#bd2c2c;">Seat Captain 在开始前 12 小时内取消了计划，该房间当前不可用。</div>` : ""}
          ${plan.note ? `<div class="muted">${escapeHtml(plan.note)}</div>` : ""}
          <div class="compact-list">
            ${members.length ? members.map((member) => `<span class="pill">${escapeHtml(profileName(member.user_id))} · ${escapeHtml(member.status)}${member.eta ? " · " + escapeHtml(timeShort(member.eta)) : ""}</span>`).join("") : `<span class="muted">还没有人加入。</span>`}
          </div>
          <div class="row">
            ${!joined && left > 0 && plan.status !== "cancelled" ? `<button class="small primary" data-room-join="${plan.id}" type="button">申请加入</button>` : ""}
            ${joined && mine?.status !== "confirmed" && checkInReady ? `<button class="small" data-room-checkin="${mine.id}" type="button">我已到达</button>` : ""}
            ${joined && mine?.status !== "confirmed" && !checkInReady ? `<span class="muted">未到可签到时间</span>` : ""}
            ${joined ? `<button class="small danger" data-room-cancel-member="${mine.id}" type="button">取消加入</button>` : ""}
            ${canEdit && plan.status !== "completed" ? `<button class="small" data-room-edit="${plan.id}" type="button">修改计划</button>` : ""}
            ${canManageArrival && plan.status !== "completed" ? `<button class="small primary" data-room-arrival="${plan.id}" type="button">${plan.actual_room_label ? "更新房间信息" : "填写房间号"}</button>` : ""}
            ${isCaptain && !canEdit ? `<span class="muted">开始前 12 小时内锁定核心信息</span>` : ""}
            ${canManage && !["cancelled", "completed"].includes(plan.status) ? `<button class="small" data-room-status="${plan.id}" data-status="completed" type="button">完成承诺</button>` : ""}
            ${canManage && !["cancelled", "completed"].includes(plan.status) ? `<button class="small danger" data-room-status="${plan.id}" data-status="cancelled" type="button">取消计划</button>` : ""}
          </div>
        `;
        box.appendChild(item);
      });

      box.querySelectorAll("[data-room-join]").forEach((button) => {
        button.addEventListener("click", async () => {
          const eta = prompt("预计到达时间，例如 09:30", "09:30");
          if (eta === null) return;
          await joinRoomPlan(button.dataset.roomJoin, eta);
        });
      });

      box.querySelectorAll("[data-room-checkin]").forEach((button) => {
        button.addEventListener("click", async () => {
          const plan = state.roomPlans.find((item) => myMembership(item.id)?.id === button.dataset.roomCheckin);
          if (plan && !canCheckInNow(plan)) {
            alert("还没到可签到时间。请在 Seat Captain 到达时间之后再签到。");
            return;
          }
          await updateRoomMember(button.dataset.roomCheckin, { status: "confirmed", checked_in_at: new Date().toISOString() });
        });
      });

      box.querySelectorAll("[data-room-cancel-member]").forEach((button) => {
        button.addEventListener("click", async () => updateRoomMember(button.dataset.roomCancelMember, { status: "cancelled" }));
      });

      box.querySelectorAll("[data-room-edit]").forEach((button) => {
        button.addEventListener("click", () => editRoomPlan(button.dataset.roomEdit));
      });

      box.querySelectorAll("[data-room-arrival]").forEach((button) => {
        button.addEventListener("click", () => focusCaptainEditor(button.dataset.roomArrival, "room"));
      });

      box.querySelectorAll("[data-room-status]").forEach((button) => {
        button.addEventListener("click", async () => updateRoomPlanStatus(button.dataset.roomStatus, button.dataset.status));
      });
    }

    function renderMyCaptainActions() {

      box.replaceChildren();

            </div>
            <div class="captain-editor-grid">
              <label class="field">
                <span>房间号</span>
                <input data-captain-room="${plan.id}" value="${escapeHtml(plan.actual_room_label || "")}" placeholder="例如 0.06">
              </label>

                <span>可共享座位</span>

    function renderCaptainBoard() {
      const box = $("captainBoard");
      box.replaceChildren();
      const captains = state.profiles
        .map((profile) => {
          const plans = state.roomPlans.filter((plan) => plan.captain_id === profile.id);
          return {
            profile,
            plans,
            completed: plans.filter((plan) => plan.status === "completed").length,
            title: captainTitle(profile.id),
            reliability: captainReliability(profile.id)
          };
        })
        .filter((entry) => entry.plans.length > 0)
        .sort((a, b) => b.completed - a.completed || b.plans.length - a.plans.length);

      if (captains.length === 0) {
        box.innerHTML = `<div class="empty">还没有 Seat Captain。第一个发布房间计划的人会获得 Seat Captain 标识。</div>`;
        return;
      }

      captains.forEach((entry) => {
        const item = document.createElement("div");
        item.className = "item";
        item.innerHTML = `
          <div class="split">
            <strong>${escapeHtml(entry.profile.nickname)}</strong>
            <span class="captain-badge">${escapeHtml(entry.title || "Seat Captain")}</span>
          </div>
          <div class="muted">${entry.completed} completed · ${entry.plans.length} total · reliability ${escapeHtml(entry.reliability)}</div>
        `;
        box.appendChild(item);
      });
    }

    function renderChat() {

      const box = $("chatList");
      box.replaceChildren();
      if (state.chat.length === 0) {
        box.innerHTML = `<div class="empty">广场还没有消息。</div>`;
        return;
      }
      [...state.chat].reverse().forEach((message) => {
        const row = document.createElement("div");
        row.className = "message";
        row.innerHTML = `
          <div class="muted">${escapeHtml(profileName(message.user_id))} · ${new Date(message.created_at).toLocaleString()}</div>
          <div>${escapeHtml(message.body)}</div>
        `;
        box.appendChild(row);
      });
      box.scrollTop = box.scrollHeight;
    }

    function renderFeedback() {
      $("adminFeedbackPanel").classList.toggle("hidden", !isAdmin());
      const box = $("feedbackList");
      if (!isAdmin()) return;
      box.replaceChildren();
      if (state.feedback.length === 0) {
        box.innerHTML = `<div class="empty">暂无反馈。</div>`;
        return;
      }
      state.feedback.forEach((item) => {
        const row = document.createElement("div");
        row.className = "item";
        row.innerHTML = `
          <div class="split">
            <strong>${escapeHtml(item.category)}</strong>
            <span class="pill">${escapeHtml(item.status)}</span>
          </div>
          <div class="muted">${escapeHtml(profileName(item.user_id))} · ${new Date(item.created_at).toLocaleString()}</div>
          <div>${escapeHtml(item.message)}</div>
          <div class="row">
            <button class="small" data-feedback-status="${item.id}" data-status="read">标记 read</button>
            <button class="small" data-feedback-status="${item.id}" data-status="resolved">标记 resolved</button>
          </div>
        `;
        box.appendChild(row);
      });

      box.querySelectorAll("[data-feedback-status]").forEach((button) => {
        button.addEventListener("click", async () => {
          await requireOk(
            await supabase.from("feedback").update({ status: button.dataset.status }).eq("id", button.dataset.feedbackStatus),
            "Cannot update feedback"
          );
          await loadApp();
          renderApp();
        });
      });
    }

    function renderReleaseHistory() {
      const box = $("releaseHistory");
      const badge = $("releaseVersionBadge");
      if (!box || !badge) return;
      box.replaceChildren();
      const current = RELEASE_HISTORY[0];
      badge.textContent = `当前 ${current.version}`;

      RELEASE_HISTORY.forEach((entry) => {
        const item = document.createElement("section");
        item.className = "release-item";
        item.innerHTML = `
          <div class="release-head">
            <div class="release-meta">
              <strong>${escapeHtml(entry.version)}</strong>
              <span class="release-date">${escapeHtml(entry.date)}</span>
            </div>
          </div>
          <ul class="release-list">
            ${entry.changes.map((change) => `<li>${escapeHtml(change)}</li>`).join("")}
          </ul>
        `;
        box.appendChild(item);
      });
    }

    async function createRoomPlan() {
      const roomType = $("roomType").value;
      const shareableSeats = Math.max(1, Number($("roomCapacity").value) || defaultCapacity(roomType));
      const payload = {
        captain_id: state.profile.id,
        plan_date: $("roomPlanDate").value || today(),
        start_time: $("roomStartTime").value,
        end_time: $("roomEndTime").value,
        planned_arrival: $("captainArrival").value || null,
        campus: "StudiTUM Innenstadt",
        room_type: roomType,
        actual_room_label: null,
        topic: $("roomTopic").value.trim() || null,
        discussion_mode: $("discussionMode").value,
        max_capacity: shareableSeats + 1,
        guest_hold_count: 0,
        note: $("roomNote").value.trim() || null
      };

      if (!payload.plan_date || !payload.start_time || !payload.end_time) {
        alert("请填写日期、开始和结束时间。");
        return;
      }

      const plan = await requireOk(
        await supabase.from("room_plans").insert(payload).select().single(),
        "Cannot create room plan"
      );

      await requireOk(
        await supabase.from("room_plan_members").upsert({
          room_plan_id: plan.id,
          user_id: state.profile.id,
          status: "expected",
          eta: payload.planned_arrival
        }),
        "Cannot add Seat Captain to room plan"
      );

      $("roomTopic").value = "";
      $("roomNote").value = "";
      await loadApp();
      renderApp();
    }

    async function joinRoomPlan(planId, eta) {
      await requireOk(
        await supabase.from("room_plan_members").upsert({
          room_plan_id: planId,
          user_id: state.profile.id,
          status: "requested",
          eta: eta || null
        }, { onConflict: "room_plan_id,user_id" }),
        "Cannot join room plan"
      );
      await loadApp();
      renderApp();
    }

    async function updateRoomMember(memberId, patch) {
      await requireOk(
        await supabase.from("room_plan_members").update(patch).eq("id", memberId),
        "Cannot update room member"
      );
      await loadApp();
      renderApp();
    }

    async function editRoomPlan(planId) {
      focusCaptainEditor(planId, "plan");
    }

    async function saveCaptainPlanSettings(planId) {
      const plan = state.roomPlans.find((item) => item.id === planId);
      if (!plan) return;
      if (!canEditRoomPlan(plan)) {
        setCaptainEditorStatus(planId, "开始前 12 小时内不能修改时间、主题、容量等核心信息。", "error");
        return;
      }

      const startInput = document.querySelector(`[data-captain-start="${planId}"]`);
      const endInput = document.querySelector(`[data-captain-end="${planId}"]`);
      const arrivalInput = document.querySelector(`[data-captain-arrival="${planId}"]`);
      const roomTypeInput = document.querySelector(`[data-captain-room-type="${planId}"]`);
      const discussionInput = document.querySelector(`[data-captain-discussion="${planId}"]`);
      const topicInput = document.querySelector(`[data-captain-topic="${planId}"]`);
      const roomInput = document.querySelector(`[data-captain-room="${planId}"]`);
      const shareableInput = document.querySelector(`[data-captain-shareable="${planId}"]`);
      const noteInput = document.querySelector(`[data-captain-note="${planId}"]`);
      if (!startInput || !endInput || !arrivalInput || !roomTypeInput || !discussionInput || !topicInput) return;

      const roomInfoChanged = Boolean(
        roomInput && roomInput.value.trim() !== (plan.actual_room_label || "")
        || shareableInput && Math.max(0, Number(shareableInput.value) || 0) !== shareableSeatLimit(plan)
        || noteInput && noteInput.value.trim() !== (plan.note || "")
      );

      setCaptainEditorStatus(planId, "正在保存计划设置...", "");
      try {
        await requireOk(
          await supabase.from("room_plans").update({
            start_time: startInput.value || plan.start_time,
            end_time: endInput.value || plan.end_time,
            planned_arrival: arrivalInput.value || null,
            room_type: roomTypeInput.value || plan.room_type,
            discussion_mode: discussionInput.value || plan.discussion_mode,
            topic: topicInput.value.trim() || null
          }).eq("id", planId),
          "Cannot save Seat Captain plan settings"
        );
        await loadApp();
        renderApp();
        focusCaptainEditor(planId, roomInfoChanged ? "room" : "plan");
        setCaptainEditorStatus(
          planId,
          roomInfoChanged
            ? "计划设置已保存。房间号、可共享座位和备注还没有保存，请点击下方“保存房间号和座位”。"
            : "计划设置已保存。",
          roomInfoChanged ? "error" : "success"
        );
      }
      catch (error) {
        console.error(error);
        setCaptainEditorStatus(planId, `保存失败：${error.message}`, "error");
      }
    }

    async function saveCaptainRoomInfo(planId) {
      const plan = state.roomPlans.find((item) => item.id === planId);
      if (!plan) return;
      if (!canManageArrivalInfo(plan)) {
        setCaptainEditorStatus(planId, "只有 Seat Captain 或管理员可以更新房间信息。", "error");
        return;
      }
      const roomInput = document.querySelector(`[data-captain-room="${planId}"]`);
      const shareableInput = document.querySelector(`[data-captain-shareable="${planId}"]`);
      const noteInput = document.querySelector(`[data-captain-note="${planId}"]`);
      if (!roomInput || !shareableInput || !noteInput) return;

      const shareableSeats = Math.max(0, Number(shareableInput.value) || 0);

      if (!canCheckInNow(plan)) {
        setCaptainEditorStatus(planId, "还没到可签到时间。请在 Seat Captain 到达时间之后再填写实际房间并标记到场。", "error");
        return;
      }

      setCaptainEditorStatus(planId, "正在保存房间号和座位...", "");
      try {
        await requireOk(
          await supabase.from("room_plans").update({
            actual_room_label: roomInput.value.trim() || null,
            max_capacity: shareableSeats + 1,
            guest_hold_count: 0,
            note: noteInput.value.trim() || null,
            status: plan.status === "cancelled" ? "cancelled" : "active"
          }).eq("id", planId),
          "Cannot save Seat Captain room info"
        );

        const captainMembership = membersForPlan(planId).find((member) => member.user_id === state.profile.id && member.status !== "cancelled");
        if (captainMembership && captainMembership.status !== "confirmed") {
          await requireOk(
            await supabase.from("room_plan_members").update({
              status: "confirmed",
              checked_in_at: new Date().toISOString()
            }).eq("id", captainMembership.id),
            "Cannot confirm Seat Captain arrival"
          );
        }

        await loadApp();
        renderApp();
        focusCaptainEditor(planId, "room");
        setCaptainEditorStatus(planId, "房间号和可共享座位已保存。", "success");
      }
      catch (error) {
        console.error(error);
        setCaptainEditorStatus(planId, `保存失败：${error.message}`, "error");
      }
    }

    async function updateRoomPlanStatus(planId, status) {
      const patch = { status };
      if (status === "cancelled") patch.cancelled_at = new Date().toISOString();
      if (status !== "cancelled") patch.cancelled_at = null;
      await requireOk(
        await supabase.from("room_plans").update(patch).eq("id", planId),
        "Cannot update room plan status"
      );
      await loadApp();
      renderApp();
    }

    async function sendFeedback() {
      const message = $("feedbackMessage").value.trim();
      if (!message) return;
      await requireOk(
        await supabase.from("feedback").insert({
          user_id: state.profile.id,
          category: $("feedbackCategory").value,
          message
        }),
        "Cannot send feedback"
      );
      $("feedbackMessage").value = "";
      $("feedbackStatus").textContent = "已提交。";
    }

    async function sendChat() {
      const body = $("chatInput").value.trim();
      if (!body) return;
      await requireOk(
        await supabase.from("chat_messages").insert({ user_id: state.profile.id, body }),
        "Cannot send chat"
      );
      $("chatInput").value = "";
      await loadApp();
      renderApp();
    }

    function bind() {
      $("signupButton").addEventListener("click", signUp);
      $("loginButton").addEventListener("click", login);
      $("logoutButton").addEventListener("click", logout);
      $("refreshButton").addEventListener("click", async () => {
        await loadApp();
        renderApp();
      });
      $("createRoomPlanButton").addEventListener("click", createRoomPlan);
      $("roomType").addEventListener("change", () => {
        $("roomCapacity").value = String(defaultCapacity($("roomType").value));
      });
      $("roomPlanDate").addEventListener("change", () => {
        renderRoomCalendar();
        renderRoomPlans();
      });
      $("sendFeedbackButton").addEventListener("click", sendFeedback);
      $("reloadFeedbackButton").addEventListener("click", async () => {
        await loadApp();
        renderApp();
      });
      $("sendChatButton").addEventListener("click", sendChat);
      $("chatInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") sendChat();
      });
    }

    supabase.auth.onAuthStateChange((_event, session) => {
      state.session = session;
    });

    bind();
    boot().catch((error) => {
      console.error(error);
      alert(`加载失败：${error.message}\n\n请确认已经在 Supabase SQL Editor 运行 schema，并检查 Supabase Auth 配置。`);
      renderAuth();
    });
  </script>
</body>
</html>
