name: Check Supabase Migrations

on:
  pull_request:
    paths:
      - "sql/**"
      - "supabase/**"
      - "scripts/sync-supabase-migrations.ps1"
      - "scripts/supabase-migration-map.ps1"
      - ".github/workflows/check-supabase.yml"
  push:
    branches:
      - main
    paths:
      - "sql/**"
      - "supabase/**"
      - "scripts/sync-supabase-migrations.ps1"
      - "scripts/supabase-migration-map.ps1"
      - ".github/workflows/check-supabase.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify generated migrations are synced
        shell: pwsh
        run: ./scripts/sync-supabase-migrations.ps1 -CheckOnly

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase database
        run: supabase db start

      - name: Reapply migrations on a clean local database
        run: supabase db reset
