name: Deploy Supabase Database

on:
  workflow_dispatch:
    inputs:
      bootstrap_existing_remote:
        description: "One-time: mark the existing remote schema as already migrated before first db push."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing SUPABASE_DB_PASSWORD"; exit 1; }
          test -n "$SUPABASE_PROJECT_ID" || { echo "Missing SUPABASE_PROJECT_ID"; exit 1; }

      - name: Sync generated migrations
        shell: pwsh
        run: ./scripts/sync-supabase-migrations.ps1 -CheckOnly

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link repository to remote Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Bootstrap remote migration history
        if: ${{ inputs.bootstrap_existing_remote }}
        shell: pwsh
        run: ./scripts/bootstrap-supabase-history.ps1

      - name: Push pending migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Show linked migration history
        run: supabase migration list --linked --password "$SUPABASE_DB_PASSWORD"
