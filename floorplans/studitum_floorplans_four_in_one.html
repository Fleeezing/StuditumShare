<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudiTUM ????????</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #ffffff;
      --ink: #17211c;
      --muted: #66716b;
      --line: #d7dfdb;
      --wall: #17211c;
      --large: #eef0ff;
      --medium: #e7f8ee;
      --small: #e9f3ff;
      --service: #fff3d7;
      --lift: #eef2ef;
      --wc-m: #e5efff;
      --wc-f: #fff0f5;
      --stairs: #e5f8ec;
      --entry: #eaf7ff;
      --corridor: #ffffff;
      --unavailable: #f2f2f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(1320px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 20px 0 34px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
    }

    h2 { margin: 0; font-size: 16px; }

    .code {
      color: var(--muted);
      font: 12px "Cascadia Mono", Consolas, ui-monospace, monospace;
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      background: #fff;
    }

    .outer { fill: #fff; stroke: var(--wall); stroke-width: 5; }
    .corridor { fill: var(--corridor); stroke: var(--wall); stroke-width: 2; }
    .wall { stroke: var(--wall); stroke-width: 5; stroke-linecap: square; }
    .large { fill: var(--large); stroke: #6d54c8; stroke-width: 2; }
    .medium { fill: var(--medium); stroke: #247a4b; stroke-width: 2; }
    .small { fill: var(--small); stroke: #2368d8; stroke-width: 2; }
    .service { fill: var(--service); stroke: #a36d00; stroke-width: 2; }
    .lift { fill: var(--lift); stroke: #6d7770; stroke-width: 2; }
    .wcm { fill: var(--wc-m); stroke: #2368d8; stroke-width: 2; }
    .wcf { fill: var(--wc-f); stroke: #bd2c6b; stroke-width: 2; }
    .stairs { fill: var(--stairs); stroke: #247a4b; stroke-width: 2; }
    .entry { fill: var(--entry); stroke: #1592ce; stroke-width: 2; }
    .unavailable { fill: var(--unavailable); stroke: #777f79; stroke-width: 2; stroke-dasharray: 7 4; }
    .note-line { stroke: #c8d3cd; stroke-width: 1; stroke-dasharray: 4 4; }

    .label {
      fill: var(--ink);
      font-weight: 760;
      font-size: 14px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .small-label {
      fill: var(--muted);
      font-size: 11px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .mini-label {
      fill: var(--ink);
      font-weight: 720;
      font-size: 12px;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .notes {
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 14px;
      background: #fff;
    }

    ul {
      margin: 8px 0 0;
      padding-left: 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      padding: 12px 14px 14px;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
    }

    .swatch { display: inline-flex; align-items: center; gap: 6px; }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid var(--line);
      background: var(--small);
    }
    .dot.large { background: var(--large); }
    .dot.medium { background: var(--medium); }
    .dot.service { background: var(--service); }
    .dot.lift { background: var(--lift); }
    .dot.wcm { background: var(--wc-m); }
    .dot.wcf { background: var(--wc-f); }
    .dot.stairs { background: var(--stairs); }
    .dot.entry { background: var(--entry); }

    @media print {
      body { background: #fff; }
      main { width: 100%; padding: 0; }
      .card { break-inside: avoid; }
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  
    main { width: min(1320px, calc(100vw - 28px)); }
    h1 { margin-bottom: 12px; }
    .grid { margin-top: 0; }
    @media print { .head { padding: 8px 10px; } }
  </style>
</head>
